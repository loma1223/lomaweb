  <title>Cafe Loma UG | Bald eröffnet</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #fef9f2;
      color: #1c1917;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    
    .logo {
      width: 400px;
      max-width: 85vw;
      height: auto;
      margin-bottom: 3.5rem;
    }
    
    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
      color: #1c1917;
    }
    
    .tagline {
      font-size: 1.25rem;
      font-weight: 600;
      color: #00502b;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .message {
      font-size: 1.1rem;
      color: #57534e;
      max-width: 500px;
      line-height: 1.6;
      margin-bottom: 3rem;
    }
    
    .divider {
      width: 60px;
      height: 4px;
      background: #00502b;
      border-radius: 2px;
      margin-bottom: 3rem;
    }
    
    .contact {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      align-items: center;
    }
    
    .contact-label {
      font-size: 0.875rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #78716c;
    }
    
    .contact-link {
      color: #00502b;
      text-decoration: none;
      font-size: 1.1rem;
      font-weight: 600;
      padding: 0.875rem 2rem;
      border: 2px solid #00502b;
      border-radius: 50px;
      transition: all 0.3s ease;
      background: transparent;
    }
    
    .contact-link:hover {
      background: #00502b;
      color: #ffffff;
    }
    
    .footer-links {
      margin-top: 4rem;
      display: flex;
      gap: 2rem;
      font-size: 0.875rem;
      color: #a8a29e;
    }
    
    .footer-links a {
      color: #78716c;
      text-decoration: none;
      transition: color 0.2s;
    }
    
    .footer-links a:hover {
      color: #00502b;
      text-decoration: underline;
    }
    
    @media (max-width: 480px) {
      h1 {
        font-size: 1.75rem;
      }
      
      .tagline {
        font-size: 1.1rem;
      }
      
      .logo {
        width: 280px;
        margin-bottom: 2.5rem;
      }
    }
  </style>
</head>
